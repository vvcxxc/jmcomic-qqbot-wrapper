services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: jm-napcat
    restart: unless-stopped
    ports:
      - "6099:6099"
      - "13000:3000"
    volumes:
      - ./tools/napcat-docker/config:/app/napcat/config
      - ./tools/napcat-docker/qq:/app/.config/QQ
      - ./downloads/zip:/app/napcat/shared
